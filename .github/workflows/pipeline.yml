name: Pipeline

on: [push, pull_request]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync
      - name: Run tests
        run: uv run pytest tests/ -v
      - name: Run pipeline against sample file
        env:
          DATA_PATH: data/dataset-sample.jsonl
          DB_PATH: data/listens.db
          PREFECT_API_URL: ""
          PREFECT_SERVER_TELEMETRY_ENABLED: "false"
          PREFECT_LOGGING_TO_API_ENABLED: "false"
        run: uv run python pipeline.py
