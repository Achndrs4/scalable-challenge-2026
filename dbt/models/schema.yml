version: 2

models:
  - name: raw_listens
    description: "Append-only log of every batch ever ingested. Nulls and duplicates are expected — filtered and deduplicated in stg_listens."
    columns:
      - name: user_name
        description: "ListenBrainz username."
      - name: recording_msid
        description: "ListenBrainz recording identifier."
      - name: listened_at_unix
        description: "Unix timestamp (seconds) of when the listen occurred."
      - name: artist_name
        description: "Artist name as submitted by the user."
      - name: track_name
        description: "Track name as submitted by the user."
      - name: release_name
        description: "Album or release name."
      - name: artist_msid
        description: "ListenBrainz artist identifier."
      - name: track_mbid
        description: "MusicBrainz canonical track ID."
      - name: spotify_id
        description: "Spotify URI for the track."
      - name: batch_timestamp
        description: "Microseconds since epoch at the time this dbt run executed. Used to identify and order batches."
      - name: batch_id
        description: "dbt invocation UUID. Uniquely identifies the dbt run that produced this row."

  - name: stg_listens
    description: "Cleaned and deduplicated layer over raw_listens. Incremental — new batches are merged via unique_key, latest batch wins."
    columns:
      - name: user_name
        description: "ListenBrainz username. Guaranteed non-null and non-blank."
        tests:
          - not_null
      - name: recording_msid
        description: "ListenBrainz recording identifier. Guaranteed non-null and non-blank."
        tests:
          - not_null
      - name: listened_at_unix
        description: "Unix timestamp (seconds) of when the listen occurred. Guaranteed positive."
        tests:
          - not_null
      - name: artist_name
        description: "Artist name, whitespace-trimmed."
      - name: track_name
        description: "Track name, whitespace-trimmed."
      - name: release_name
        description: "Album or release name."
      - name: artist_msid
        description: "ListenBrainz artist identifier."
      - name: track_mbid
        description: "MusicBrainz canonical track ID."
      - name: spotify_id
        description: "Spotify URI for the track."
      - name: batch_timestamp
        description: "Microseconds since epoch of the ingestion run that last wrote this row."
      - name: batch_id
        description: "dbt invocation UUID of the run that last wrote this row."

  - name: listens
    description: "Semantic layer over stg_listens. Human-readable timestamps, COALESCE defaults applied, internal pipeline columns removed."
    columns:
      - name: user_name
        description: "ListenBrainz username."
        tests:
          - not_null
      - name: recording_msid
        description: "ListenBrainz recording identifier."
        tests:
          - not_null
      - name: listened_at
        description: "Timestamp of the listen, converted from Unix epoch."
        tests:
          - not_null
      - name: listen_date
        description: "Date portion of listened_at, for day-level aggregations."
      - name: artist_name
        description: "Artist name. Defaults to 'Unknown' if missing in source."
        tests:
          - not_null
      - name: track_name
        description: "Track name. Defaults to 'Unknown' if missing in source."
        tests:
          - not_null
      - name: release_name
        description: "Album or release name."
      - name: spotify_id
        description: "Spotify URI for the track."
